<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>

<div class="container">

    <h1>📊 Dashboard Analyse</h1>

    <div class="cards">

        <div class="card">
            Total conducteurs: {{ stats.total }}
        </div>

        <div class="card">
            Revenu moyen: {{ stats.revenu_moyen }}
        </div>

        <div class="card">
            Fatigue moyenne: {{ stats.fatigue_moyenne }}
        </div>

        <div class="card">
            Taux accident: {{ stats.accident_rate }}%
        </div>

    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Dashboard Intelligent</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1 style="text-align:center;">Dashboard Intelligent</h1>

<div class="grid">
    <div id="graph1"></div>
    <div id="graph2"></div>
</div>

<script>
    // ✅ Injection propre et sécurisée JSON
    const data = JSON.parse('{{ graph_data | tojson | safe }}');

    // ===== Graph 1 : Revenu vs Heures =====
    Plotly.newPlot("graph1", [{
        x: data.heures,
        y: data.revenu,
        mode: "markers",
        type: "scatter"
    }], {
        title: "Revenu vs Heures",
        paper_bgcolor: "#0f172a",
        plot_bgcolor: "#0f172a",
        font: { color: "white" }
    });

    // ===== Graph 2 : Clustering =====
    Plotly.newPlot("graph2", [{
        x: data.revenu,
        y: data.fatigue,
        mode: "markers",
        type: "scatter",
        marker: {
            size: 10,
            color: data.clusters,
            colorscale: "Viridis"
        }
    }], {
        title: "Clusters Conducteurs",
        paper_bgcolor: "#0f172a",
        plot_bgcolor: "#0f172a",
        font: { color: "white" }
    });
</script>

</body>
</html>

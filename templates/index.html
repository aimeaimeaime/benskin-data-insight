<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benskin Analytics — Collecte</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="form-page">

<div class="form-wrapper">
    <div class="form-header">
        <div class="logo-badge">🏍️</div>
        <h1>Benskin <span class="accent">Analytics</span></h1>
        <p class="subtitle">Observatoire Intelligent du Transport Urbain · Yaoundé</p>
    </div>

    <form action="/submit" method="POST" class="data-form" id="mainForm">

        <div class="form-section">
            <h2 class="section-title"><span class="step">01</span> Profil du Conducteur</h2>
            <div class="field-grid">
                <div class="field">
                    <label for="age">Âge</label>
                    <input type="number" id="age" name="age" min="18" max="70" placeholder="Ex: 28" required>
                </div>
                <div class="field">
                    <label for="experience">Années d'expérience</label>
                    <input type="number" id="experience" name="experience" min="0" max="40" placeholder="Ex: 5" required>
                </div>
                <div class="field full">
                    <label for="zone">Zone de travail</label>
                    <select id="zone" name="zone" required>
                        <option value="" disabled selected>Sélectionner une zone</option>
                        <option value="Centre-ville">Centre-ville</option>
                        <option value="Bastos">Bastos</option>
                        <option value="Biyem-Assi">Biyem-Assi</option>
                        <option value="Melen">Melen</option>
                        <option value="Ngousso">Ngousso</option>
                        <option value="Essos">Essos</option>
                        <option value="Autre">Autre</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="form-section">
            <h2 class="section-title"><span class="step">02</span> Activité Journalière</h2>
            <div class="field-grid">
                <div class="field">
                    <label for="heures_travail">Heures de travail / jour</label>
                    <input type="number" id="heures_travail" name="heures_travail" min="1" max="24" step="0.5" placeholder="Ex: 8.5" required>
                </div>
                <div class="field">
                    <label for="clients">Nombre de clients / jour</label>
                    <input type="number" id="clients" name="clients" min="1" max="100" placeholder="Ex: 20" required>
                </div>
                <div class="field">
                    <label for="distance_km">Distance parcourue (km)</label>
                    <input type="number" id="distance_km" name="distance_km" min="1" max="500" step="0.1" placeholder="Ex: 85.5" required>
                </div>
                <div class="field">
                    <label for="carburant_litre">Carburant consommé (L)</label>
                    <input type="number" id="carburant_litre" name="carburant_litre" min="0.5" max="50" step="0.1" placeholder="Ex: 4.2" required>
                </div>
            </div>
        </div>

        <div class="form-section">
            <h2 class="section-title"><span class="step">03</span> Performance & Sécurité</h2>
            <div class="field-grid">
                <div class="field">
                    <label for="revenu">Revenu journalier (FCFA)</label>
                    <input type="number" id="revenu" name="revenu" min="500" max="100000" placeholder="Ex: 8500" required>
                </div>
                <div class="field">
                    <label for="note_client">Note moyenne clients (0-5)</label>
                    <input type="number" id="note_client" name="note_client" min="0" max="5" step="0.1" placeholder="Ex: 4.2" required>
                </div>
                <div class="field">
                    <label for="fatigue">Niveau de fatigue (1-10)</label>
                    <input type="number" id="fatigue" name="fatigue" min="1" max="10" placeholder="Ex: 6" required>
                    <span class="hint">1 = Frais · 10 = Épuisé</span>
                </div>
                <div class="field">
                    <label>Accident ce jour ?</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="accident" value="0" checked>
                            <span>Non</span>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="accident" value="1">
                            <span>Oui</span>
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <button type="submit" class="submit-btn">
            <span>Soumettre & Analyser</span>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
    </form>

    <div class="form-footer">
        <a href="/dashboard" class="dash-link">→ Voir le tableau de bord IA</a>
    </div>
</div>

<script>
    // Animation d'entrée des champs
    const fields = document.querySelectorAll('.field');
    fields.forEach((f, i) => {
        f.style.opacity = '0';
        f.style.transform = 'translateY(16px)';
        setTimeout(() => {
            f.style.transition = 'all 0.4s ease';
            f.style.opacity = '1';
            f.style.transform = 'translateY(0)';
        }, 80 + i * 40);
    });
</script>
</body>
</html>
